apiVersion: v1
kind: Service
metadata:
  name: {{ .Release.Name }}-postgres-service
  namespace: {{ .Values.namespace }}
  labels:
    app: {{ .Release.Name }}-postgres
spec:
  type: ClusterIP
  ports:
    - port: {{ .Values.service.postgres.port }}
      targetPort: {{ .Values.service.postgres.targetPort }}
      protocol: TCP
      name: tcp-postgresql
  selector:
    app: {{ .Release.Name }}-postgres
