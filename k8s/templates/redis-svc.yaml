apiVersion: v1
kind: Service
metadata:
  name: {{ .Release.Name }}-redis-service
  namespace: {{ .Values.namespace }}
  labels:
    app: {{ .Release.Name }}-redis
spec:
  type: ClusterIP
  ports:
    - port: {{ .Values.service.redis.port }}
      targetPort: {{ .Values.service.redis.targetPort }}
      protocol: TCP
      name: tcp-redis
  selector:
    app: {{ .Release.Name }}-redis
